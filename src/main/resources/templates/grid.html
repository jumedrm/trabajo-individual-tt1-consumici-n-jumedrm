<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Grid De Resultados</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h3>RESULTADOS DE SIMULACIÓN</h3>
        </div>
        <div class="card-body">
            <div th:if="${datos != null}">
                <p><strong>Token:</strong> <span th:text="${tok}"></span></p>
                
                <p><strong>Estado:</strong> 
                   <span th:text="${datos.done != null && datos.done ? 'Finalizado' : 'En proceso'}"></span>
                </p>
                
                <hr>
                <h5>Datos extraídos:</h5>
                <div class="p-3 bg-light border rounded">
                    <pre th:text="${datos.data}"></pre>
                </div>
            </div>
            
            <div th:if="${datos == null}" class="alert alert-danger">
                error: no se han recibido datos de la máquina virtual.
            </div>

            <a href="/solicitud" class="btn btn-secondary mt-3">Volver</a>
        </div>
    </div>
</body>
</html>
